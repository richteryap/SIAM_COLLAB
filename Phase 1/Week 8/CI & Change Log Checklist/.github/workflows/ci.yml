# .github/workflows/ci.yml
# Continuous Integration pipeline for Flashcard Quiz App
# Triggers on every push and pull request to main and dev

name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd client
          npm ci

      # Step 4: Lint check
      - name: Run linter
        run: |
          cd client
          npx eslint src/ --ext .js,.jsx --no-error-on-unmatched-pattern || true

      # Step 5: Run unit tests with coverage
      - name: Run tests
        run: |
          cd client
          npm test -- --watchAll=false --coverage
        env:
          CI: true

      # Step 6: Build check
      - name: Build application
        run: |
          cd client
          npm run build

      # Step 7: Upload coverage artifact
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: client/coverage/
          retention-days: 7