# .github/workflows/ci.yml
# Continuous Integration pipeline for Flashcard Quiz App
# Triggers on every push and pull request to main and dev

name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd client
          npm ci

      # Step 4: Lint check
      - name: Run linter
        run: |
          cd client
          npx eslint src/ --ext .js,.jsx --no-error-on-unmatched-pattern || true

      # Step 5: Run unit tests with coverage
      - name: Run tests
        run: |
          cd client
          npm test -- --watchAll=false --coverage
        env:
          CI: true

      # Step 6: Build check
      - name: Build application
        run: |
          cd client
          npm run build

      # Step 7: Upload the production build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: client/build/
          retention-days: 1

      # Step 8: Upload coverage artifact
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: client/coverage/
          retention-days: 7

  deploy:
    name: Deploy & Smoke Test
    # Run if the build-and-test job passes AND the branch is main
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: client/build/

      - name: Deploy to Production
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }} 
        run: |
          echo "Deploying application using provided secrets..."
          # Example for Vercel: npx vercel deploy --prod --token=$DEPLOY_TOKEN --yes
          # Example for generic server: scp -r client/build/* user@server:/var/www/html/

      - name: Run Smoke Test
        env:
          PROD_URL: ${{ secrets.PROD_URL }} 
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10  
          
          echo "Pinging production URL: $PROD_URL"
          # -s (silent), -o /dev/null (hide output), -w (print HTTP code)
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $PROD_URL)
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Smoke test passed! Endpoint returned 200 OK."
          else
            echo "Smoke test failed! HTTP status: $HTTP_STATUS"
            exit 1
          fi